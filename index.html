<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Dev Portfolio World</title>

<style>
:root {
  --gold: #e6b566;
  --sand: #d8c3a5;
  --leaf: #7aa874;
  --forest: #2f4f2f;
  --soil: #3e2a1f;
  --dark: #0b120d;
  --text: #f5f5f0;
}

/* =========================
   BASE
========================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: var(--text);
  overflow-x: hidden;
  background: radial-gradient(circle at 40% 20%, #2f4f2f, #0b120d 70%);
}

/* 🌫️ FOG */
.world-bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(
    circle at 50% 30%,
    rgba(230,181,102,0.08),
    rgba(0,0,0,0.7)
  );
  pointer-events: none;
  z-index: 0;
}

/* =========================
   CAMERA
========================= */
.world-content {
  position: relative;
  z-index: 2;
  transform: translateY(0px);
  transition: transform 0.1s linear;
}

/* =========================
   LEVEL SELECT
========================= */
.level-select {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.level-btn {
  background: linear-gradient(135deg, var(--gold), var(--sand));
  border: none;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
  color: var(--soil);
  transition: 0.2s;
}

.level-btn:hover {
  transform: scale(1.05);
}

/* =========================
   SECTIONS (CLOSER TOGETHER)
========================= */
section {
  padding: 40px 20px; /* 🔥 reduced from 80px */
  max-width: 900px;
  margin: 0 auto 20px auto; /* tighter spacing between sections */
  display: flex;
  flex-direction: column;
  justify-content: center;

  background: rgba(62, 42, 31, 0.25); /* subtle “zone panel” */
  border: 1px solid rgba(122,168,116,0.15);
  border-radius: 12px;
}

/* =========================
   TYPOGRAPHY
========================= */
h2 {
  color: var(--leaf);
  text-shadow: 0 0 8px rgba(122,168,116,0.3);
  margin-top: 0;
}

/* =========================
   CARDS
========================= */
.card {
  background: rgba(62, 42, 31, 0.85);
  border: 1px solid rgba(122,168,116,0.2);
  padding: 1rem;
  border-radius: 12px;
  margin-top: 10px;
}

/* =========================
   BUTTONS
========================= */
.button {
  display: inline-block;
  margin-top: 12px;
  padding: 12px 18px;
  background: linear-gradient(135deg, var(--gold), var(--sand));
  color: var(--soil);
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* =========================
   ABOUT
========================= */
.about {
  display: flex;
  gap: 20px;
  align-items: center;
}

.profile {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 3px solid var(--leaf);
}

/* =========================
   FOOTER
========================= */
footer {
  text-align: center;
  padding: 30px;
  background: rgba(0,0,0,0.4);
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🌫️ FOG -->
<div class="world-bg"></div>

<!-- 🧭 LEVEL SELECT -->
<div class="level-select">
  <button class="level-btn" onclick="goTo(0)">About</button>
  <button class="level-btn" onclick="goTo(1)">Skills</button>
  <button class="level-btn" onclick="goTo(2)">Projects</button>
  <button class="level-btn" onclick="goTo(3)">Contact</button>
</div>

<!-- 🌍 WORLD -->
<div class="world-content" id="world">

<section>
  <div class="about">
    <img src="Images/HeadShot.jpg" class="profile"/>
    <div>
      <h2>About Me</h2>
      <p>
        Game developer focused on systems, gameplay, and multiplayer engineering.
      </p>
    </div>
  </div>
</section>

<section>
  <h2>Skills</h2>
  <div class="card">C++, C#, Unreal, Unity</div>
  <div class="card">Multiplayer Systems</div>
  <div class="card">Game Architecture</div>
</section>

<section>
  <h2>Projects</h2>
  <div class="card">Potion Panic</div>
  <div class="card">Voidcoil</div>
  <div class="card">Operation Starfall</div>
</section>

<section>
  <h2>Contact</h2>
  <p>Email: michael.gray.dev@gmail.com</p>
  <a class="button">View Resume</a>
</section>

<footer>© 2026 Michael Gray</footer>

</div>

<script>
function goTo(level) {
  window.scrollTo({
    top: document.body.scrollHeight * (level / 4),
    behavior: "smooth"
  });
}
</script>

</body>
</html>
